<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frontend Frameworks — Review Deck</title>
  <meta name="description" content="Fast review deck for frontend, fullstack, desktop-GUI, game-dev & UI-adjacent tech: Preact, React, Angular, Vue, TanStack, AdonisJS, Wasp, Yew (Rust→WASM), C++ WebAssembly, Flutter, desktop GUI (Qt/C++, PySide6, Tkinter, egui/Rust, Fyne/Go), game dev (Pygame, SDL/C++), Solidity + Foundry, EVM TS clients, and TON (Tact/FunC)." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <button id="menuToggle" class="icon-btn" aria-label="Toggle menu" title="Menu">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div class="brand">
      <span class="brand-mark">🎨</span>
      <span class="brand-text">Frontend Review Deck</span>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><path d="M21 21l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="searchInput" type="text" placeholder="Search everything…  ( / )" autocomplete="off" spellcheck="false" />
      <kbd class="search-kbd">/</kbd>
      <div id="searchResults" class="search-results" hidden></div>
    </div>

    <button id="flashBtn" class="icon-btn" aria-label="Flashcards" title="Flashcards (f)">
      <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="5" width="14" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M7 9h6M7 13h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button id="themeToggle" class="icon-btn" aria-label="Toggle theme" title="Theme (t)">
      <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/></svg>
    </button>
    <button id="helpToggle" class="icon-btn" aria-label="Keyboard shortcuts" title="Keyboard shortcuts (?)">
      <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/><path d="M9.2 9.3a2.8 2.8 0 0 1 5.4 1c0 1.9-2.6 2.2-2.6 3.8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="12" cy="17.4" r="1.1" fill="currentColor"/></svg>
    </button>
    <!-- reading progress under the topbar -->
    <div id="readingProgress" class="reading-progress" aria-hidden="true"><span></span></div>
  </header>

  <div class="app">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <nav id="nav" class="nav" aria-label="Frameworks"></nav>
      <div class="sidebar-foot">
        <div id="deckStats" class="deck-stats"></div>
      </div>
    </aside>
    <div id="scrim" class="scrim"></div>

    <!-- Main content -->
    <main id="main" class="main">
      <div id="content" class="content"></div>
    </main>

    <!-- Right TOC -->
    <aside id="toc" class="toc" aria-label="On this page"></aside>
  </div>

  <!-- Flashcard / quiz modal -->
  <div id="flashModal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Flashcards">
      <div class="modal-head">
        <div class="modal-tabs">
          <button class="modal-tab is-active" data-mode="cards">Flashcards</button>
          <button class="modal-tab" data-mode="quiz">Quiz</button>
        </div>
        <div id="flashTitle" class="modal-title"></div>
        <button class="icon-btn" data-close aria-label="Close">✕</button>
      </div>
      <div id="flashBody" class="modal-body"></div>
      <div id="flashFoot" class="modal-foot"></div>
    </div>
  </div>

  <!-- Back to top -->
  <button id="backToTop" class="back-to-top" aria-label="Back to top" title="Back to top">
    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 19V6M6 12l6-6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <!-- Keyboard shortcuts overlay -->
  <div id="helpModal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card help-card" role="dialog" aria-modal="true" aria-label="Keyboard shortcuts">
      <div class="modal-head">
        <div class="modal-title-strong">⌨ Keyboard shortcuts</div>
        <button class="icon-btn" data-close aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="shortcut-grid">
          <div class="shortcut"><span>Focus search</span><kbd>/</kbd></div>
          <div class="shortcut"><span>Next framework</span><kbd>j</kbd></div>
          <div class="shortcut"><span>Previous framework</span><kbd>k</kbd></div>
          <div class="shortcut"><span>Open flashcards</span><kbd>f</kbd></div>
          <div class="shortcut"><span>Toggle theme</span><kbd>t</kbd></div>
          <div class="shortcut"><span>This help</span><kbd>?</kbd></div>
          <div class="shortcut"><span>Back to top</span><kbd>g</kbd> <kbd>g</kbd></div>
          <div class="shortcut"><span>Close / dismiss</span><kbd>Esc</kbd></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <!-- Engine (order matters: highlighter + renderer, then content, then features, then boot) -->
  <script>window.FRAMEWORKS = window.FRAMEWORKS || [];</script>
  <script src="js/highlight.js"></script>
  <script src="js/render.js"></script>

  <!-- Content (loaded via plain script tags so it works from file://) -->
  <!-- Web UI (JavaScript / TypeScript) -->
  <script src="content/preact.js"></script>
  <script src="content/react.js"></script>
  <script src="content/angular.js"></script>
  <script src="content/vue.js"></script>
  <script src="content/tanstack.js"></script>
  <!-- Fullstack (Node / TypeScript) -->
  <script src="content/adonisjs.js"></script>
  <script src="content/wasp.js"></script>
  <!-- WebAssembly group (Rust + C++) -->
  <script src="content/yew.js"></script>
  <script src="content/cpp-wasm.js"></script>
  <!-- Cross-platform (mobile / web / desktop) -->
  <script src="content/flutter.js"></script>
  <!-- Desktop GUI toolkits (across languages) -->
  <script src="content/qt-cpp.js"></script>
  <script src="content/pyside.js"></script>
  <script src="content/tkinter.js"></script>
  <script src="content/rust-gui.js"></script>
  <script src="content/go-gui.js"></script>
  <!-- Game development -->
  <script src="content/pygame.js"></script>
  <script src="content/sdl.js"></script>
  <script src="content/love2d.js"></script>
  <script src="content/gml.js"></script>
  <script src="content/gdscript.js"></script>
  <!-- 3D graphics & rendering (across languages) -->
  <script src="content/opengl.js"></script>
  <script src="content/wgpu.js"></script>
  <script src="content/g3n.js"></script>
  <!-- Odin: modern data-oriented systems language (gamedev-adjacent) -->
  <script src="content/odin.js"></script>
  <!-- EVM: contracts + TypeScript clients -->
  <script src="content/solidity.js"></script>
  <script src="content/evm-clients.js"></script>
  <!-- TON smart contracts -->
  <script src="content/tact.js"></script>
  <script src="content/func.js"></script>
  <!-- Practice -->
  <script src="content/sample-projects.js"></script>

  <!-- Features + boot -->
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/search.js"></script>
  <script src="js/flashcards.js"></script>
  <script src="js/ux.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
